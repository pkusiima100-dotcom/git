<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sidebar</title>

<link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet"/>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: system-ui, -apple-system, sans-serif;
    background:url(star.jpg);
    
    z-index:900;
    height:100vh;
}
.text{
    display: none;
    position:fixed;
    top:50px;
    color:white;
    font-size:Arial sans-serif;
    z-index:500;
}

/* ===== MENU BUTTON ===== */
.container{
    position:relative;
    margin:0;
    height:70px;
    width:70px;
    background-color:grey;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:2px 2px;

  
}
.container.active{
    background: rgba(0, 0, 0, 0.45);
backdrop-filter: blur(8px);
-webkit-backdrop-filter: blur(8px);
 

}
    




.btn{
    width:28px;
    height:22px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    cursor:pointer;
transform: rotate(0deg);
  transition:transform.35s ease;
}
.btn.active{
    transform:rotate(1080deg);
}
.btn span{
    height:3px;
    width:100%;
    background:white;
    border-radius:3px;
    transition:.3s ease;
    
}

/* Animate to X */
.btn.active span:nth-child(1){
    transform:translateY(9px) rotate(45deg);
}
.btn.active span:nth-child(2){
    opacity:0;
}
.btn.active span:nth-child(3){
    transform:translateY(-9px) rotate(-45deg);
}
/* ===== SIDEBAR ===== */
.sidebar{
   top:70px;
    left:0;
    position:fixed;
    width:300px;
    height:500px;
  
    color:#ccc;
    padding:20px 0;
    transform:translateX(-100%);
    transition:transform .3s ease;
    overflow-y:auto;

    z-index: 1000;
    
background: rgba(0, 0, 0, 0.45);
backdrop-filter: blur(8px);
-webkit-backdrop-filter: blur(8px);
 

    
}



.sidebar .grid{
    
display: grid;
grid-template-columns:1fr 1fr;
gap:35px 40px;    
}

.sidebar.active{
    transform:translateX(0);
}

/* SECTION TITLES */
.sidebar h2{
    font-size:12px;
    font-weight:600;
    letter-spacing:1px;
    text-transform:uppercase;
    color:#777;
    padding:15px 25px 5px;
}

/* MENU LIST */
.sidebar ul{
    list-style:none;
}

.sidebar ul li{
    width:100%;
}

.sidebar ul li a{
    display:block;
    padding:10px 25px;
    text-decoration:none;
    color:#ccc;
    font-size:15px;
    transition:.2s ease;
}

/* Hover like Lichess */
.sidebar ul li a:hover{
    background:#222;
    color:#fff;
}

/* Active item */
.sidebar ul li a.active-link{
    background:#2b2b2b;
    color:#fff;
    border-left:3px solid #00bfff;
}

/* Scrollbar */
.sidebar::-webkit-scrollbar{
    width:6px;
    
}
.sidebar::-webkit-scrollbar-thumb{
    background:#333;
}
.sidebar::-webkit-scrollbar-track{
    background:#111;
}
.submenu{
    max-height:0;
    overflow:hidden;
    list-style:none;
    padding-right:40px;
    transition:max-height.35s ease;
    
}
.submenu.show{
    max-height:300px;
}
.arrow{
    transition:transform.35s;
    
}
.arrow.rotate{
    transform:rotate(180deg);
}
.create{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding-right:120px;
    cursor:pointer;
    color:#ccc;
}

.create:hover{
    background:#222;
    color:#fff;
}


.folder{
 font-size:28px;
}


.bar{
    display:flex;
    padding:30px 30px;
    gap:30px;
    margin-left:50px; 
    background-color:grey;
    position:fixed;
    top:0;
    left:20px;
    height:70px;
    width:100%;
    align-items:center;
    
    
}
.bar button{
    background:transparent ;
    color:blue;
    font-size:15px;
    font-weight:600;
    padding:3px 3px;
    outline:none;
    border-color:blue;
    border-radius:5px;
    
}
.bar button:hover{
    background-color:black;
    transform:rotate(-10deg);
}

.bar button:active{
    background-color:yellow;
}




</style>
</head>
<body>
    
<div class="container" id ="container">
    <div class="btn" id="menu">
        <span></span>
        <span></span>
        <span></span>
    </div>
</div>

<div class="sidebar" id="sidebar">
    <div class ="grid">
    
<div class="section">
    <h2>Main</h2>
    <ul>
        <li><a href="#" class="active-link">Home</a></li>
        <li><a href="#">About Us</a></li>
        <li><a href="#">Academics</a></li>
        <li><a href="#">Gallery</a></li>
        <li><a href="#">Contacts</a></li>
    </ul>
</div>
<div class="section">
    <h2>Staff</h2>
    <ul>
        <li><a href="#">Teachers</a></li>
        <li><a href="#">Cooks</a></li>
        <li><a href="#">Workers</a></li>
        <li><a href="#">Cleaners</a></li>
    </ul>
</div>
<div class="section">
    <h2>Assistance</h2>
    <ul>
        <li><a href="#">E-learning platform</a></li>
        <li><a href="#">Online-youtube</a></li>
        <li><a href="#">Offline-lessons</a></li>
        <li><a href="#">home school</a></li>
    </ul>
</div>
<div class="section">
    
    <div class = "create">
<i class="ri-folder-line folder"></i>
        
        <span>Assignments</span>
   <i class="ri-arrow-down-s-line arrow"></i>
        
        
        </div>
    <ul class = "submenu">
        <li><a href="#">S.1</a></li>
        <li><a href="#">S.2</a></li>
        <li><a href="#">S.3</a></li>
        <li><a href="#">S.4</a></li>
    </ul>
</div>

</div>
</div>
<script>
const create = document.querySelector(".create");
const submenu = document.querySelector(".submenu");
const arrow = document.querySelector(".arrow");
const container  = document.getElementById("container");
const menu = document.getElementById("menu");
const sidebar = document.getElementById("sidebar");

create.addEventListener("click",()=>{
    submenu.classList.toggle("show");
    arrow.classList.toggle("rotate") 
});

menu.addEventListener("click", () => {
    container.classList.toggle("active");
    menu.classList.toggle("active");
    sidebar.classList.toggle("active");
});

    if(e.touches[0].clientX-startX<-70){
sidebar.classList.remove("active");
    }

*/
</script>

</body>
</html>
